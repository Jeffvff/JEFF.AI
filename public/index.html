<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEFF.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #171717;
      --bg-tertiary: #1e1e1e;
      --bg-hover: #2a2a2a;
      --bg-active: #333;
      --border: #2a2a2a;
      --text-primary: #ececec;
      --text-secondary: #a0a0a0;
      --accent: #6c5ce7;
      --accent-hover: #7c6ff7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --user-bubble: #2d2b55;
      --danger: #e74c3c;
      --sidebar-width: 280px;
    }

    /* === SETTINGS PANEL === */
    .settings-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .settings-btn:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
      border-color: var(--accent);
    }
    .settings-btn svg { width: 20px; height: 20px; }

    .settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
    }
    .settings-overlay.visible { display: block; }

    .settings-panel {
      position: fixed;
      top: 0;
      right: -360px;
      width: 340px;
      max-width: 90vw;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      z-index: 201;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .settings-panel.open { right: 0; }

    .settings-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-header h3 {
      font-size: 1.05rem;
      font-weight: 600;
    }
    .settings-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .settings-close:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }
    .settings-close svg { width: 20px; height: 20px; }

    .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; }

    .settings-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-row input[type="color"] {
      -webkit-appearance: none;
      border: 2px solid var(--border);
      border-radius: 8px;
      width: 40px;
      height: 32px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }
    .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
    .color-hex {
      font-size: 0.8rem;
      font-family: monospace;
      color: var(--text-secondary);
      min-width: 60px;
    }

    .presets-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .preset-btn {
      padding: 10px 12px;
      border-radius: 8px;
      border: 2px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s;
      color: var(--text-primary);
    }
    .preset-btn:hover { border-color: var(--accent); }
    .preset-swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .theme-section { display: flex; flex-direction: column; gap: 12px; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* === SIDEBAR === */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: margin-left 0.3s ease;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo-text span {
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .new-chat-btn {
      width: 100%;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .new-chat-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .new-chat-btn svg {
      width: 18px;
      height: 18px;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .session-item:hover {
      background: var(--bg-hover);
    }

    .session-item.active {
      background: var(--bg-active);
    }

    .session-title {
      font-size: 0.85rem;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 8px;
    }

    .session-actions {
      display: none;
      gap: 2px;
    }

    .session-item:hover .session-actions {
      display: flex;
    }

    .session-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .session-actions button:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .session-actions button.delete:hover {
      color: var(--danger);
    }

    .session-actions svg {
      width: 16px;
      height: 16px;
    }

    /* === MAIN AREA === */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
    }

    .main-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      padding: 6px;
    }

    .menu-toggle svg {
      width: 22px;
      height: 22px;
    }

    .main-model {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* === MESSAGES === */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }

    .message-wrapper {
      padding: 16px 24px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    .message-wrapper.user {
      padding-right: calc(24px + 5%);
    }

    .message-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .message-wrapper.user .message-label {
      color: var(--accent);
    }

    .message-content {
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-content.user-content {
      color: var(--text-primary);
    }

    .message-content.assistant-content {
      color: #d4d4d4;
    }

    /* === WELCOME SCREEN === */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 24px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
      color: #fff;
      margin-bottom: 24px;
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .welcome h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 400px;
    }

    /* === TYPING INDICATOR === */
    .typing-indicator {
      display: none;
      padding: 0 24px 16px;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      color: var(--accent);
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-dots {
      width: 18px;
      height: 12px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.32s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.1); }
    }

    /* === INPUT AREA === */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .input-container {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: border-color 0.2s;
    }

    .input-container:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    #input {
      width: 100%;
      background: none;
      color: var(--text-primary);
      border: none;
      padding: 14px 56px 14px 18px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 150px;
      line-height: 1.5;
    }

    #input::placeholder {
      color: var(--text-secondary);
    }

    #send {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, background 0.2s;
    }

    #send:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    #send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #send svg {
      width: 18px;
      height: 18px;
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 760px;
      margin: 8px auto 0;
      padding: 0 4px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* === MOBILE SIDEBAR === */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
    }

    .overlay.visible {
      display: block;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 100;
        margin-left: calc(var(--sidebar-width) * -1);
      }

      .sidebar.open {
        margin-left: 0;
      }

      .menu-toggle {
        display: flex;
      }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-active); }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">J</div>
        <div class="logo-text"><span>JEFF.AI</span></div>
      </div>
      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Novo Chat
      </button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <!-- OVERLAY for mobile -->
  <div class="overlay" id="overlay"></div>

<!-- SETTINGS PANEL -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h3>Customizar</h3>
    <button class="settings-close" id="settingsClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  <div class="settings-body">
    <div class="theme-section">
      <label style="font-size:0.8rem;font-weight:500;color:var(--text-secondary);">Temas</label>
      <div class="presets-grid" id="presetsGrid">
        <button class="preset-btn" data-preset="default">
          <span class="preset-swatch" style="background:#6c5ce7;"></span>
          Roxo
        </button>
        <button class="preset-btn" data-preset="ocean">
          <span class="preset-swatch" style="background:#00b4d8;"></span>
          Oceano
        </button>
        <button class="preset-btn" data-preset="emerald">
          <span class="preset-swatch" style="background:#2ecc71;"></span>
          Esmeralda
        </button>
        <button class="preset-btn" data-preset="sunset">
          <span class="preset-swatch" style="background:#fd761c;"></span>
          Pôr do Sol
        </button>
        <button class="preset-btn" data-preset="rose">
          <span class="preset-swatch" style="background:#e75a7d;"></span>
          Rosa
        </button>
        <button class="preset-btn" data-preset="gold">
          <span class="preset-swatch" style="background:#f0c040;"></span>
          Dourado
        </button>
      </div>
    </div>
    <div class="settings-section">
      <label>Cor de destaque</label>
      <div class="color-row">
        <input type="color" id="accentPicker" value="#6c5ce7">
        <span class="color-hex" id="accentHex">#6c5ce7</span>
      </div>
    </div>
    <div class="settings-section">
      <label>Cor de fundo principal</label>
      <div class="color-row">
        <input type="color" id="bgPicker" value="#0f0f0f">
        <span class="color-hex" id="bgHex">#0f0f0f</span>
      </div>
    </div>
    <div style="text-align:center;">
      <button id="resetTheme" style="background:var(--bg-hover);border:1px solid var(--border);color:var(--text-secondary);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.8rem;">Resetar cores</button>
    </div>
  </div>
</div>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <button class="menu-toggle" id="menuToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div class="main-model" id="modelBadge">Qwen 3.6 Plus</div>
      <button class="settings-btn" id="settingsBtn" title="Customizar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>

    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">J</div>
        <h2>JEFF.AI</h2>
        <p>Pergunte qualquer coisa. Eu posso ajudar com código, escrita, análise e muito mais.</p>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
      JEFF.AI est&aacute; digitando...
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea id="input" rows="1" placeholder="Envie uma mensagem..."></textarea>
        <button id="send" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span>Enter para enviar, Shift+Enter para nova linha</span>
        <span id="msgCount"></span>
      </div>
    </div>
  </main>

  <script>
    // === elements ===
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const typingEl = document.getElementById('typingIndicator');
    const welcomeEl = document.getElementById('welcome');
    const sessionListEl = document.getElementById('sessionList');
    const newChatBtn = document.getElementById('newChatBtn');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarEl = document.getElementById('sidebar');
    const overlayEl = document.getElementById('overlay');
    const modelBadge = document.getElementById('modelBadge');
    const msgCountEl = document.getElementById('msgCount');

    let sessionId = null;
    let loading = false;

    // === localStorage helpers ===
    function getSessions() {
      try { return JSON.parse(localStorage.getItem('jeff-sessions') || '{}'); } catch { return {}; }
    }
    function saveSessions(sessions) {
      localStorage.setItem('jeff-sessions', JSON.stringify(sessions));
    }

    function getSession(id) {
      return getSessions()[id];
    }
    function createSession(id, title) {
      const sessions = getSessions();
      sessions[id] = { id, title, messages: [], created: Date.now() };
      saveSessions(sessions);
    }
    function deleteSession(id) {
      const sessions = getSessions();
      delete sessions[id];
      saveSessions(sessions);
    }
    function updateSessionTitle(id, title) {
      if (!id) return;
      const sessions = getSessions();
      if (sessions[id]) { sessions[id].title = title; saveSessions(sessions); }
    }
    function addMessageToSession(id, role, content) {
      if (!id) return;
      const sessions = getSessions();
      if (sessions[id]) {
        sessions[id].messages.push({ role, content });
        saveSessions(sessions);
      }
    }

    // === init ===
    function loadSessions() {
      const sessions = getSessions();
      const list = Object.values(sessions).sort((a, b) => b.created - a.created);
      renderSessionList(list);
    }

    function renderSessionList(sessions) {
      sessionListEl.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item' + (s.id === sessionId ? ' active' : '');
        div.dataset.id = s.id;
        div.innerHTML = `
          <span class="session-title">${escHtml(s.title)}</span>
          <div class="session-actions">
            <button class="rename" title="Renomear">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="delete" title="Excluir">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        `;

        div.addEventListener('click', (e) => {
          if (e.target.closest('.rename')) {
            handleRename(s.id);
            return;
          }
          if (e.target.closest('.delete')) {
            handleDelete(s.id);
            return;
          }
          switchSession(s.id);
        });

        sessionListEl.appendChild(div);
      });
    }

    // === new chat ===
    newChatBtn.addEventListener('click', () => {
      sessionId = crypto.randomUUID();
      createSession(sessionId, 'Novo chat');
      clearMessages();
      showWelcome();
      sidebarEl.classList.remove('open');
      overlayEl.classList.remove('visible');
      loadSessions();
      inputEl.focus();
    });

    // === switch session ===
    function switchSession(id) {
      sessionId = id;
      sidebarEl.classList.remove('open');
      overlayEl.classList.remove('visible');

      const session = getSession(id);
      clearMessages();
      if (session && session.messages.length) {
        hideWelcome();
        session.messages.forEach(m => addMessage(m.role, m.content));
      } else {
        showWelcome();
      }
      updateMsgCount(session ? session.messages.length : 0);
      loadSessions();
      inputEl.focus();
    }

    function handleDelete(id) {
      if (!confirm('Excluir este chat?')) return;
      deleteSession(id);
      if (sessionId === id) {
        sessionId = null;
        clearMessages();
        showWelcome();
      }
      loadSessions();
    }

    function handleRename(id) {
      const title = prompt('Nome do chat:');
      if (!title || !title.trim()) return;
      updateSessionTitle(id, title.trim());
      loadSessions();
    }

    // === sidebar toggle ===
    menuToggle.addEventListener('click', () => {
      sidebarEl.classList.toggle('open');
      overlayEl.classList.toggle('visible');
    });

    overlayEl.addEventListener('click', () => {
      sidebarEl.classList.remove('open');
      overlayEl.classList.remove('visible');
    });

    // === messages ===
    function clearMessages() {
      messagesEl.innerHTML = '';
    }

    function showWelcome() {
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcome';
      welcome.innerHTML = `
        <div class="welcome-icon">J</div>
        <h2>JEFF.AI</h2>
        <p>Pergunte qualquer coisa. Eu posso ajudar com c&oacute;digo, escrita, an&aacute;lise e muito mais.</p>
      `;
      messagesEl.appendChild(welcome);
    }

    function hideWelcome() {
      const el = document.querySelector('.welcome');
      if (el) el.remove();
    }

    function addMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${role}`;
      wrapper.innerHTML = `
        <div class="message-label">${role === 'user' ? 'Voc&ecirc;' : 'JEFF.AI'}</div>
        <div class="message-content ${role === 'user' ? 'user-content' : 'assistant-content'}">${escHtml(text)}</div>
      `;
      messagesEl.appendChild(wrapper);
      scrollBottom();
      return wrapper;
    }

    function updateMsgCount(count) {
      msgCountEl.textContent = count ? `${count} mensagens` : '';
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || loading) return;

      loading = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Auto-create session if none exists
      if (!sessionId || !getSession(sessionId)) {
        sessionId = crypto.randomUUID();
        createSession(sessionId, text.slice(0, 50) + (text.length > 50 ? '...' : ''));
      }

      hideWelcome();

      // Save user message
      addMessageToSession(sessionId, 'user', text);

      const userMsgEl = addMessage('user', text);
      const assistantEl = addMessage('assistant', '');
      const dots = document.createElement('span');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';
      assistantEl.querySelector('.message-content').prepend(dots);
      typingEl.classList.add('visible');
      typingEl.style.display = 'flex';

      try {
        // Build history from localStorage
        const session = getSession(sessionId);
        const history = session.messages;

        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => null);
          const errMsg = errData?.error || `Erro ${response.status} do servidor`;
          throw new Error(errMsg);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

          for (const line of lines) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.text) {
                if (dots) dots.remove();
                fullText += data.text;
                assistantEl.querySelector('.message-content').textContent = fullText;
                scrollBottom();
              }
            } catch {}
          }
        }

        // Save assistant response
        if (fullText) {
          addMessageToSession(sessionId, 'assistant', fullText);
        }

        // Auto-title on first message
        if (session.messages.length <= 4 || !session.title || session.title === 'Novo chat') {
          updateSessionTitle(sessionId, text.slice(0, 50) + (text.length > 50 ? '...' : ''));
        }
      } catch (err) {
        assistantEl.querySelector('.message-content').textContent = 'Erro: ' + err.message;
      } finally {
        loading = false;
        sendBtn.disabled = false;
        typingEl.classList.remove('visible');
        typingEl.style.display = 'none';
        loadSessions();
        inputEl.focus();
      }
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // === send ===
    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // === auto-resize textarea ===
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    });

    // === THEME CUSTOMIZATION ===
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const settingsClose = document.getElementById('settingsClose');
    const accentPicker = document.getElementById('accentPicker');
    const bgPicker = document.getElementById('bgPicker');
    const accentHex = document.getElementById('accentHex');
    const bgHex = document.getElementById('bgHex');
    const resetTheme = document.getElementById('resetTheme');
    const presetsGrid = document.getElementById('presetsGrid');

    const themes = {
      default:  { accent: '#6c5ce7', bg: '#0f0f0f' },
      ocean:    { accent: '#00b4d8', bg: '#0c1b2f' },
      emerald:  { accent: '#2ecc71', bg: '#0f1f15' },
      sunset:   { accent: '#fd761c', bg: '#1f120c' },
      rose:     { accent: '#e75a7d', bg: '#1f0f15' },
      gold:     { accent: '#f0c040', bg: '#1f1c0c' },
    };

    function hexToLight(hex, pct) {
      let r = parseInt(hex.slice(1,3), 16);
      let g = parseInt(hex.slice(3,5), 16);
      let b = parseInt(hex.slice(5,7), 16);
      r = Math.min(255, r + pct);
      g = Math.min(255, g + pct);
      b = Math.min(255, b + pct);
      return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
    }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function setTheme(accent, bg) {
      const r = document.documentElement.style;
      r.setProperty('--accent', accent);
      r.setProperty('--accent-hover', hexToLight(accent, 15));
      r.setProperty('--accent-glow', hexToRgba(accent, 0.3));
      r.setProperty('--bg-primary', bg);
      r.setProperty('--bg-secondary', hexToLight(bg, 5));
      r.setProperty('--bg-tertiary', hexToLight(bg, 10));
      r.setProperty('--bg-hover', hexToLight(bg, 18));
      r.setProperty('--bg-active', hexToLight(bg, 25));
      r.setProperty('--border', hexToLight(bg, 15));

      localStorage.setItem('jeff-ai-accent', accent);
      localStorage.setItem('jeff-ai-bg', bg);
      accentPicker.value = accent;
      bgPicker.value = bg;
      accentHex.textContent = accent;
      bgHex.textContent = bg;
    }

    // open / close
    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.add('open');
      settingsOverlay.classList.add('visible');
    });
    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', closeSettings);
    function closeSettings() {
      settingsPanel.classList.remove('open');
      settingsOverlay.classList.remove('visible');
    }

    // presets
    presetsGrid.addEventListener('click', e => {
      const btn = e.target.closest('.preset-btn');
      if (!btn) return;
      const preset = themes[btn.dataset.preset];
      if (preset) setTheme(preset.accent, preset.bg);
    });

    // color pickers
    accentPicker.addEventListener('input', e => setTheme(e.target.value, bgPicker.value));
    bgPicker.addEventListener('input', e => setTheme(accentPicker.value, e.target.value));

    // reset
    resetTheme.addEventListener('click', () => setTheme(themes.default.accent, themes.default.bg));

    // load saved theme
    const savedAccent = localStorage.getItem('jeff-ai-accent');
    const savedBg = localStorage.getItem('jeff-ai-bg');
    if (savedAccent && savedBg) setTheme(savedAccent, savedBg);

    // === init ===
    loadSessions();
  </script>
</body>
</html>
